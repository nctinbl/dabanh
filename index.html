<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FC-Chuyên Bạc Liêu - Mr Tín Pro</title>
    <style>
        body { margin: 0; background: #000; color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; touch-action: none; }
        #game-container { position: relative; width: 100vw; max-width: 900px; aspect-ratio: 3/2; border: 3px solid #fff; background: #1b5e20; }
        canvas { display: block; width: 100%; height: 100%; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.96); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; padding: 10px; box-sizing: border-box; }
        .selection-area { display: flex; gap: 10px; width: 95%; height: 40%; margin-top: 5px; }
        .list-container { background: #1a1a1a; padding: 5px; border-radius: 8px; width: 50%; border: 1px solid #444; display: flex; flex-direction: column; overflow: hidden; }
        .player-list { list-style: none; padding: 0; margin: 0; flex-grow: 1; overflow-y: auto; background: #000; }
        .player-item { padding: 10px; border-bottom: 1px solid #222; cursor: pointer; font-size: 13px; }
        .selected { background: #27ae60 !important; font-weight: bold; }
        button { padding: 12px 40px; font-size: 18px; background: #c0392b; color: white; border: none; border-radius: 25px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        #hud { position: absolute; top: 10px; width: 100%; display: flex; justify-content: space-around; font-size: 20px; font-weight: bold; text-shadow: 2px 2px #000; pointer-events: none; z-index: 10; }
        .detail-row { display: flex; justify-content: space-between; width: 280px; border-bottom: 1px solid #444; padding: 5px 0; font-size: 14px; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="hud">
        <div id="hud-turn">Lượt: 1/5</div>
        <div id="hud-score">Vào: 0</div>
    </div>

    <div id="intro" class="overlay">
        <h2 style="color:#f1c40f; margin:0;">GAME SÚT PHẠT ĐỀN</h2>
        <h3 style="margin:2px;">FC-CHUYÊN BẠC LIÊU</h3>
        <div style="font-style: italic; color: #3498db; margin-bottom: 5px;">Người viết: Mr Tín</div>
        <div class="selection-area">
            <div class="list-container"><h4>THỦ MÔN</h4><ul id="gk-list" class="player-list"></ul></div>
            <div class="list-container"><h4>CẦU THỦ SÚT (5)</h4><ul id="st-list" class="player-list"></ul></div>
        </div>
        <button id="start-btn" onclick="startGame()" disabled>RA SÂN</button>
    </div>

    <div id="summary" class="overlay" style="display: none;">
        <h1 style="color:#f1c40f;">TỔNG KẾT CHI TIẾT</h1>
        <div id="stat-content"></div>
        <button onclick="location.reload()" style="margin-top:20px;">CHƠI LẠI</button>
    </div>

    <canvas id="gameCanvas" width="900" height="600"></canvas>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const gksData = ["Phi Phi (01)", "Filip Nguyễn (21)", "Văn Lượm (02)", "Tấn Phát (20)"];
const stsData = ["Hồ Định (99)", "Chánh Tín (19)", "Tiến Sĩ (08)", "Vĩnh Vĩnh (10)", "Mạnh Cường (04)", "Minh Chí (07)", "Thanh Thái (09)", "Khánh Hiến (101)", "Thanh Hùng (05)"];

let selectedGK = "", selectedStrikers = [], shotResults = [];
let currentTurn = 0, score = 0, gameState = 'INTRO';
let aimPos = { x: 450, y: 150 };
let ball = { x: 450, y: 520, r: 15, vx: 0, vy: 0, s: 1, state: 'STILL' }; // STILL, FLYING, IN_NET, REBOUND
let gk = { x: 450, y: 175, dx: 0, dy: 0, state: 'IDLE' };
let ref = { x: 180, y: 460, state: 'IDLE' };
let strikerAnim = 'IDLE';
let netStretch = 0, fb = { text: "", opacity: 0, color: "", s: 1 };
let lastClickTime = 0, turnLock = false;

function initLists() {
    const gkUl = document.getElementById('gk-list');
    gksData.forEach(name => {
        const li = document.createElement('li'); li.className='player-item'; li.innerText=name;
        li.onclick = () => { document.querySelectorAll('#gk-list .player-item').forEach(e=>e.classList.remove('selected')); li.classList.add('selected'); selectedGK=name; checkReady(); };
        gkUl.appendChild(li);
    });
    const stUl = document.getElementById('st-list');
    stsData.forEach(name => {
        const li = document.createElement('li'); li.className='player-item'; li.innerText=name;
        li.onclick = () => { if(selectedStrikers.length < 5 && !selectedStrikers.includes(name)){ selectedStrikers.push(name); li.classList.add('selected'); checkReady(); } };
        stUl.appendChild(li);
    });
}
function checkReady() { document.getElementById('start-btn').disabled = !(selectedGK && selectedStrikers.length === 5); }

function drawPerson(x, y, color, label, isGK, dive = {x:0, y:0}, state = 'IDLE', isRef = false) {
    ctx.save();
    let idle = Math.sin(Date.now() / 150) * 4;
    ctx.translate(x + dive.x, y + dive.y + (state === 'IDLE' ? idle : 0));
    if(state === 'LEFT') ctx.rotate(-Math.PI/6);
    if(state === 'RIGHT') ctx.rotate(Math.PI/6);
    
    ctx.fillStyle = isRef ? "#111" : "#222"; ctx.fillRect(-15, -85, 30, 10);
    ctx.fillStyle = "#ffdbac"; ctx.beginPath(); ctx.arc(0, -65, 18, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = color; ctx.fillRect(-25, -45, 50, 60);
    ctx.strokeStyle = "#ffdbac"; ctx.lineWidth = 10; ctx.beginPath();
    if (state === 'WHISTLE') { ctx.moveTo(-25, -35); ctx.lineTo(-10, -75); ctx.moveTo(25, -35); ctx.lineTo(10, -75); }
    else { ctx.moveTo(-25, -35); ctx.lineTo(-40, -10); ctx.moveTo(25, -35); ctx.lineTo(40, -10); }
    ctx.stroke();
    
    ctx.fillStyle = "#111";
    if (state === 'KICK') { ctx.fillRect(-20, 15, 12, 25); ctx.save(); ctx.translate(10, 15); ctx.rotate(-Math.PI/3); ctx.fillRect(0, 0, 12, 25); ctx.restore(); }
    else { ctx.fillRect(-20, 15, 12, 25); ctx.fillRect(8, 15, 12, 25); }
    ctx.restore();
    if(!isRef) {
        ctx.fillStyle = "white"; ctx.font = "bold 14px Arial"; ctx.textAlign="center";
        ctx.fillText(label.split('(')[0], x + dive.x, y + dive.y + 75);
        ctx.fillText(label.match(/\d+/)[0], x + dive.x, y + dive.y - 30);
    }
}

function update() {
    if(gameState === 'INTRO' || gameState === 'SUMMARY') return;
    ctx.clearRect(0, 0, 900, 600);
    for(let i=0; i<600; i+=60) { ctx.fillStyle = (i/60)%2===0 ? "#1b5e20" : "#237029"; ctx.fillRect(0, i, 900, 60); }
    
    // Lưới
    ctx.strokeStyle = "rgba(255,255,255,0.4)"; ctx.lineWidth = 1;
    for(let i=250; i<=650; i+=20) {
        ctx.beginPath(); ctx.moveTo(i, 50); 
        let stretch = (ball.state === 'IN_NET' && Math.abs(ball.x - i) < 60) ? netStretch : 0;
        ctx.lineTo(i, 200 + stretch); ctx.stroke();
    }
    ctx.strokeStyle = "white"; ctx.lineWidth = 8; ctx.strokeRect(250, 50, 400, 150);

    if(ball.state === 'STILL') {
        ctx.beginPath(); ctx.setLineDash([10, 10]); ctx.strokeStyle = "rgba(255,255,0,0.6)";
        ctx.moveTo(ball.x, ball.y); ctx.lineTo(aimPos.x, aimPos.y); ctx.stroke(); ctx.setLineDash([]);
        ctx.beginPath(); ctx.lineWidth=2; ctx.strokeStyle="#f1c40f"; ctx.arc(aimPos.x, aimPos.y, 15, 0, Math.PI*2); ctx.stroke();
    }

    drawPerson(ref.x, ref.y, "#000", "", false, {x:0, y:0}, ref.state, true);
    drawPerson(550, 510, "#e74c3c", selectedStrikers[currentTurn], false, {x:0, y:0}, strikerAnim);
    drawPerson(gk.x, 175, "#f1c40f", selectedGK, true, {x: gk.dx, y: gk.dy}, gk.state);

    if(ball.state === 'FLYING' || ball.state === 'REBOUND' || ball.state === 'IN_NET') {
        ball.x += ball.vx; ball.y += ball.vy;
        if(ball.state === 'FLYING') {
            ball.s -= 0.007; if(ball.s < 0.6) ball.s = 0.6;
            if(gk.state === 'LEFT' && gk.dx > -185) gk.dx -= 10; if(gk.state === 'RIGHT' && gk.dx < 185) gk.dx += 10;
            
            // KIỂM TRA VA CHẠM
            let caught = Math.abs(ball.x - (gk.x + gk.dx)) < 90 && Math.abs(ball.y - 175) < 110;
            if(ball.y < 200 && ball.x > 250 && ball.x < 650) {
                if(caught) { 
                    ball.state = 'REBOUND'; ball.vx *= -0.5; ball.vy *= -0.4; // VĂNG BÓNG
                    finishTurn(false);
                } else { 
                    ball.state = 'IN_NET'; netStretch = 40; ball.vx = 0; ball.vy = 0; // TUNG LƯỚI & DỪNG
                    finishTurn(true);
                }
            } else if(ball.y < 50 || ball.x < 100 || ball.x > 800) { ball.state = 'REBOUND'; finishTurn(false); }
        }
    }

    ctx.save(); ctx.translate(ball.x, ball.y); ctx.scale(ball.s, ball.s);
    ctx.fillStyle = "white"; ctx.beginPath(); ctx.arc(0, 0, ball.r, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = "black"; ctx.stroke(); ctx.restore();

    if(fb.opacity > 0) {
        ctx.save(); ctx.globalAlpha = fb.opacity; ctx.fillStyle = fb.color;
        ctx.font = `bold ${80 * fb.s}px Arial`; ctx.textAlign="center";
        ctx.fillText(fb.text, 450, 320); fb.opacity -= 0.015; fb.s += 0.002; ctx.restore();
    }
    requestAnimationFrame(update);
}

function finishTurn(isGoal) {
    if(turnLock) return;
    turnLock = true;
    if(isGoal) { score++; fb = {text: "VÀOOO!", color: "#2ecc71", opacity: 1, s: 1}; shotResults.push({n: selectedStrikers[currentTurn], r: "VÀO"}); }
    else { fb = {text: "KHÔNG VÀO!", color: "#e74c3c", opacity: 1, s: 1}; shotResults.push({n: selectedStrikers[currentTurn], r: "HỎNG"}); }
    document.getElementById('hud-score').innerText = `Vào: ${score}`;
    
    setTimeout(() => {
        currentTurn++;
        if(currentTurn < 5) {
            resetField();
            document.getElementById('hud-turn').innerText = `Lượt: ${currentTurn + 1}/5`;
        } else { showSummary(); }
    }, 2000);
}

function resetField() {
    ball = { x: 450, y: 520, r: 15, vx: 0, vy: 0, s: 1, state: 'STILL' };
    gk = { x: 450, y: 175, dx: 0, dy: 0, state: 'IDLE' };
    ref.state = 'IDLE'; strikerAnim = 'IDLE'; netStretch = 0; fb.opacity = 0;
    turnLock = false;
}

function handleInput(e) {
    if(gameState !== 'PLAYING' || ball.state !== 'STILL' || turnLock) return;
    const rect = canvas.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    const inputX = (clientX - rect.left) * (canvas.width / rect.width);
    const inputY = (clientY - rect.top) * (canvas.height / rect.height);
    
    let now = Date.now();
    if (now - lastClickTime < 350) {
        strikerAnim = 'KICK'; ref.state = 'WHISTLE';
        setTimeout(() => {
            const dx = aimPos.x - ball.x, dy = aimPos.y - ball.y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            ball.vx = (dx/dist) * 19; ball.vy = (dy/dist) * 19;
            ball.state = 'FLYING';
            const r = Math.random(); gk.state = r < 0.4 ? 'LEFT' : (r < 0.8 ? 'RIGHT' : 'IDLE');
        }, 150);
    } else { aimPos.x = inputX; aimPos.y = inputY; }
    lastClickTime = now;
}

function showSummary() {
    gameState = 'SUMMARY'; document.getElementById('summary').style.display = 'flex';
    let html = `<h3>Thủ môn: ${selectedGK}</h3>`;
    shotResults.forEach((s, i) => {
        html += `<div class="detail-row"><span>${i+1}. ${s.n}</span><b style="color:${s.r==='VÀO'?'#2ecc71':'#e74c3c'}">${s.r}</b></div>`;
    });
    html += `<h2 style="color:#f1c40f">TỔNG: ${score}/5</h2><p style="font-style:italic">Tác giả: Mr Tín</p>`;
    document.getElementById('stat-content').innerHTML = html;
}

function startGame() { document.getElementById('intro').style.display = 'none'; gameState = 'PLAYING'; update(); }
initLists();
canvas.addEventListener('touchstart', (e) => { e.preventDefault(); handleInput(e); }, {passive: false});
canvas.addEventListener('mousedown', handleInput);
</script>
</body>
</html>
