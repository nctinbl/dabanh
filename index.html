<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FC-Chuyên Bạc Liêu - Final Mobile</title>
    <style>
        body { margin: 0; background: #050505; color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; touch-action: none; }
        
        #game-container { position: relative; width: 100vw; max-width: 950px; aspect-ratio: 3/2; border: 2px solid #fff; background: #1b5e20; box-shadow: 0 0 30px rgba(0,0,0,0.5); }
        canvas { display: block; width: 100%; height: 100%; }
        
        /* Cảnh báo xoay màn hình */
        @media screen and (orientation: portrait) {
            #portrait-warning { display: flex !important; }
        }
        #portrait-warning { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; 
            z-index: 1000; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; 
        }

        /* Overlay UI - Kéo dài danh sách */
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.94); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; padding: 10px; box-sizing: border-box; }
        
        .game-title-main { color: #f1c40f; font-size: 1.8rem; margin: 0; text-shadow: 2px 2px #c0392b; }
        .selection-area { display: flex; gap: 15px; width: 95%; height: 65%; margin-top: 10px; }
        
        .list-container { background: #1a1a1a; padding: 10px; border-radius: 10px; width: 50%; border: 1px solid #444; display: flex; flex-direction: column; }
        .list-container h4 { margin: 0 0 5px 0; font-size: 1rem; color: #f1c40f; text-align: center; }
        
        .player-list { list-style: none; padding: 0; margin: 0; flex-grow: 1; overflow-y: auto; border: 1px solid #333; background: #000; }
        .player-item { padding: 12px; border-bottom: 1px solid #222; cursor: pointer; font-size: 0.9rem; transition: 0.2s; }
        .player-item:hover { background: #333; }
        .selected { background: #27ae60 !important; font-weight: bold; }
        
        .how-to-play { background: rgba(241, 196, 15, 0.15); padding: 5px 15px; border-radius: 5px; margin: 5px; font-size: 0.8rem; border: 1px solid #f1c40f; width: 90%; text-align: center; }
        
        button { padding: 10px 40px; font-size: 1.2rem; background: #c0392b; color: white; border: none; border-radius: 25px; cursor: pointer; font-weight: bold; margin-top: 10px; box-shadow: 0 4px #871a10; }
        button:active { transform: translateY(2px); box-shadow: 0 2px #871a10; }
        button:disabled { background: #444; box-shadow: none; opacity: 0.5; }
        
        #hud { position: absolute; top: 10px; width: 100%; display: flex; justify-content: space-around; font-size: 1.2rem; font-weight: bold; text-shadow: 2px 2px #000; pointer-events: none; z-index: 10; }
    </style>
</head>
<body>

<div id="portrait-warning">
    <div style="font-size: 50px;">🔄</div>
    <h2>VUI LÒNG XOAY NGANG ĐIỆN THOẠI</h2>
    <p>Để có trải nghiệm đá bóng tốt nhất tại FC-Chuyên Bạc Liêu</p>
</div>

<div id="game-container">
    <div id="hud">
        <div id="hud-turn">Lượt sút: 0/5</div>
        <div id="hud-score">Bàn thắng: 0</div>
    </div>

    <div id="intro" class="overlay">
        <h2 class="game-title-main">GAME SÚT PHẠT ĐỀN</h2>
        <div class="how-to-play">
            <b>HƯỚNG DẪN:</b> Chạm 1 lần để <b>NGẮM</b> • Chạm nhanh 2 lần để <b>SÚT</b>
        </div>

        <div class="selection-area">
            <div class="list-container">
                <h4>CHỌN THỦ MÔN</h4>
                <ul id="gk-list" class="player-list"></ul>
            </div>
            <div class="list-container">
                <h4>CHỌN 5 CẦU THỦ SÚT</h4>
                <ul id="st-list" class="player-list"></ul>
                <p id="counter" style="margin: 5px 0 0 0; font-size: 0.8rem; text-align: center; color: #3498db;">Đã chọn: 0/5</p>
            </div>
        </div>
        <button id="start-btn" onclick="startGame()" disabled>RA SÂN NGAY</button>
    </div>

    <div id="summary" class="overlay" style="display: none;">
        <h1 style="color: #f1c40f;">KẾT THÚC TRẬN ĐẤU</h1>
        <div id="rank-info" style="font-size: 1.2rem; text-align: center; margin: 20px 0;"></div>
        <button onclick="location.reload()">CHƠI LẠI</button>
    </div>

    <canvas id="gameCanvas" width="900" height="600"></canvas>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const gksData = ["Phi Phi (01)", "Filip Nguyễn (21)", "Văn Lượm (02)", "Tấn Phát (20)"];
const stsData = ["Hồ Định (99)", "Chánh Tín (19)", "Tiến Sĩ (08)", "Vĩnh Vĩnh (10)", "Mạnh Cường (04)", "Minh Chí (07)", "Thanh Thái (09)", "Khánh Hiến (101)", "Thanh Hùng (05)"];

let selectedGK = "", selectedStrikers = [], currentTurn = 0, score = 0, gameState = 'WAIT';
let aimPos = { x: 450, y: 150 };
let ball = { x: 450, y: 520, r: 15, vx: 0, vy: 0, s: 1, trail: [] };
let gk = { x: 450, y: 175, dx: 0, dy: 0, state: 'IDLE' };
let strikerAnim = { state: 'IDLE' };
let feedback = { text: "", opacity: 0, color: "" };
let lastClickTime = 0;

function initLists() {
    const gkUl = document.getElementById('gk-list');
    gksData.forEach(name => {
        const li = document.createElement('li'); li.className = 'player-item'; li.innerText = name;
        li.onclick = () => {
            document.querySelectorAll('#gk-list .player-item').forEach(el => el.classList.remove('selected'));
            li.classList.add('selected'); selectedGK = name; checkReady();
        };
        gkUl.appendChild(li);
    });
    const stUl = document.getElementById('st-list');
    stsData.forEach(name => {
        const li = document.createElement('li'); li.className = 'player-item'; li.innerText = name;
        li.onclick = () => {
            if(!selectedStrikers.includes(name) && selectedStrikers.length < 5) {
                selectedStrikers.push(name); li.classList.add('selected');
                document.getElementById('counter').innerText = `Đã chọn: ${selectedStrikers.length}/5`;
                checkReady();
            }
        };
        stUl.appendChild(li);
    });
}
function checkReady() { document.getElementById('start-btn').disabled = !(selectedGK && selectedStrikers.length === 5); }

function drawField() {
    for(let i=0; i<600; i+=60) {
        ctx.fillStyle = (i/60)%2 === 0 ? "#1b5e20" : "#237029";
        ctx.fillRect(0, i, 900, 60);
    }
    ctx.strokeStyle = "white"; ctx.lineWidth = 6;
    ctx.strokeRect(250, 50, 400, 150); // Khung thành
    ctx.strokeRect(100, 50, 700, 300); // Vòng cấm
    ctx.beginPath(); ctx.arc(450, 350, 100, 0, Math.PI, false); ctx.stroke(); 
    ctx.fillStyle = "white"; ctx.beginPath(); ctx.arc(450, 520, 8, 0, Math.PI*2); ctx.fill();
}

function drawPerson(x, y, color, label, isGK, dive = {x:0, y:0}, state = 'IDLE') {
    ctx.save();
    let idle = (!isGK && state === 'IDLE') ? Math.sin(Date.now() / 150) * 5 : 0;
    ctx.translate(x + dive.x, y + dive.y + idle);
    if(state === 'LEFT') ctx.rotate(-Math.PI/4.5);
    if(state === 'RIGHT') ctx.rotate(Math.PI/4.5);
    
    ctx.fillStyle = "#111"; ctx.fillRect(-15, -85, 30, 12);
    ctx.fillStyle = "#ffdbac"; ctx.beginPath(); ctx.arc(0, -68, 18, 0, Math.PI*2); ctx.fill(); // Đầu to rõ
    ctx.fillStyle = color; ctx.fillRect(-25, -50, 50, 60); // Thân
    ctx.fillStyle = "white"; ctx.font = "bold 20px Arial"; ctx.textAlign = "center";
    ctx.fillText(label.match(/\d+/)[0], 0, -15);
    
    ctx.strokeStyle = "#ffdbac"; ctx.lineWidth = 10; ctx.beginPath();
    let armY = (isGK && state !== 'IDLE') ? -110 : -20;
    ctx.moveTo(-25, -40); ctx.lineTo(-40, armY); ctx.moveTo(25, -40); ctx.lineTo(40, armY); ctx.stroke();
    
    if (!isGK && state === 'KICK') {
        ctx.fillStyle = "#111"; ctx.fillRect(-20, 10, 15, 25);
        ctx.save(); ctx.translate(12, 10); ctx.rotate(-Math.PI/2.5); ctx.fillRect(0, 0, 15, 30); ctx.restore();
    } else { ctx.fillStyle = "#111"; ctx.fillRect(-20, 10, 15, 25); ctx.fillRect(5, 10, 15, 25); }
    
    ctx.restore();
    ctx.save(); ctx.translate(x + dive.x, y + dive.y);
    ctx.fillStyle = "white"; ctx.font = "bold 16px Arial"; ctx.textAlign = "center";
    ctx.fillText(label.split('(')[0].trim(), 0, 70); ctx.restore();
}

function update() {
    if(gameState !== 'PLAYING') return;
    ctx.clearRect(0, 0, 900, 600);
    drawField();

    if(ball.vy === 0) {
        ctx.beginPath(); ctx.setLineDash([10, 10]); ctx.strokeStyle = "rgba(255,255,0,0.8)";
        ctx.moveTo(ball.x, ball.y); ctx.lineTo(aimPos.x, aimPos.y); ctx.stroke(); ctx.setLineDash([]);
        // Điểm ngắm rực rỡ
        ctx.beginPath(); ctx.lineWidth = 3; ctx.strokeStyle="#f1c40f"; ctx.arc(aimPos.x, aimPos.y, 20, 0, Math.PI*2); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(aimPos.x - 10, aimPos.y); ctx.lineTo(aimPos.x + 10, aimPos.y); ctx.moveTo(aimPos.x, aimPos.y - 10); ctx.lineTo(aimPos.x, aimPos.y + 10); ctx.stroke();
    }

    drawPerson(550, 500, "#e74c3c", selectedStrikers[currentTurn], false, {x:0, y:0}, strikerAnim.state);
    drawPerson(gk.x, 175, "#f1c40f", selectedGK, true, {x: gk.dx, y: gk.dy}, gk.state);

    if(ball.vy !== 0) {
        ball.trail.push({x: ball.x, y: ball.y}); if(ball.trail.length > 8) ball.trail.shift();
        ball.x += ball.vx; ball.y += ball.vy;
        ball.s -= 0.008; if(ball.s < 0.55) ball.s = 0.55;
        if(gk.state === 'LEFT') gk.dx -= 9; if(gk.state === 'RIGHT') gk.dx += 9;
        if(ball.y < 200) checkScore();
    }

    ball.trail.forEach((t, i) => {
        ctx.beginPath(); ctx.fillStyle = `rgba(255,255,255,${i/12})`;
        ctx.arc(t.x, t.y, ball.r * ball.s, 0, Math.PI*2); ctx.fill();
    });

    ctx.save(); ctx.translate(ball.x, ball.y); ctx.scale(ball.s, ball.s);
    ctx.fillStyle = "white"; ctx.beginPath(); ctx.arc(0, 0, ball.r, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = "black"; ctx.lineWidth = 2; ctx.stroke(); ctx.restore();

    if(feedback.opacity > 0) {
        ctx.save(); ctx.globalAlpha = feedback.opacity; ctx.fillStyle = feedback.color;
        ctx.font = "bold 100px Arial"; ctx.textAlign="center";
        ctx.fillText(feedback.text, 450, 320); feedback.opacity -= 0.015; ctx.restore();
    }
    requestAnimationFrame(update);
}

function checkScore() {
    ball.vx = 0; ball.vy = 0; strikerAnim.state = 'IDLE';
    let caught = Math.abs(ball.x - (gk.x + gk.dx)) < 95;
    let inGoal = ball.x > 250 && ball.x < 650 && ball.y > 50;
    if(inGoal && !caught) { score++; feedback = {text: "VÀOOO!", color: "#2ecc71", opacity: 1}; }
    else { feedback = {text: "KHÔNG VÀO!", color: "#e74c3c", opacity: 1}; }
    document.getElementById('hud-score').innerText = `Bàn thắng: ${score}`;
    setTimeout(() => {
        if(currentTurn < 4) { currentTurn++; resetBall(); document.getElementById('hud-turn').innerText = `Lượt: ${currentTurn + 1}/5`; }
        else { gameState = 'END'; document.getElementById('summary').style.display = 'flex'; document.getElementById('rank-info').innerHTML = `<h3>Thủ môn: ${selectedGK}</h3><h2>Ghi bàn: ${score}/5</h2>`; }
    }, 1800);
}

function resetBall() {
    ball = { x: 450, y: 520, r: 15, vx: 0, vy: 0, s: 1, trail: [] };
    gk = { x: 450, y: 175, dx: 0, dy: 0, state: 'IDLE' };
    feedback.opacity = 0;
}

function handleInput(e) {
    if(gameState !== 'PLAYING' || ball.vy !== 0) return;
    const rect = canvas.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    
    // Tọa độ chuẩn hóa
    const inputX = (clientX - rect.left) * (canvas.width / rect.width);
    const inputY = (clientY - rect.top) * (canvas.height / rect.height);
    
    let currentTime = new Date().getTime();
    if (currentTime - lastClickTime < 350) {
        strikerAnim.state = 'KICK';
        setTimeout(() => {
            const dx = aimPos.x - ball.x, dy = aimPos.y - ball.y, dist = Math.sqrt(dx*dx + dy*dy);
            ball.vx = (dx/dist) * 18; ball.vy = (dy/dist) * 18;
            const rnd = Math.random(); gk.state = rnd < 0.4 ? 'LEFT' : (rnd < 0.8 ? 'RIGHT' : 'IDLE');
        }, 120);
    } else {
        aimPos.x = inputX; aimPos.y = inputY;
    }
    lastClickTime = currentTime;
}

canvas.addEventListener('touchstart', (e) => { e.preventDefault(); handleInput(e); }, {passive: false});
canvas.addEventListener('mousedown', (e) => { handleInput(e); });

function startGame() { document.getElementById('intro').style.display = 'none'; gameState = 'PLAYING'; resetBall(); update(); }
initLists();
</script>
</body>
</html>
